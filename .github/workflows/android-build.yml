name: Android build

on:
  workflow_call:
    inputs:
      build-arch:
        required: true
        type: string
    secrets:
      token:
        required: true
      SIGNING_KEY_ALIAS:
        required: true
      SIGNING_KEY_PASSWORD:
        required: true
      SIGNING_STORE_PASSWORD:
        required: true

jobs:
  build-android-onearch:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Decode Keystore
      env:
        ENCODED_STRING: ${{ secrets.KEYSTORE }}
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: |
        mkdir android-project/app/keystore
        echo $ENCODED_STRING | base64 -di > android-project/app/keystore/vsp_keystore.jks

    - name: setup android dependencies
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: chmod u+x ./setup_android_on_linux.sh && ./setup_android_on_linux.sh
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        log-accepted-android-sdk-licenses: false

    - uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r27c
        link-to-sdk: true

    - name: gradlew build
      env:
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        VSP_BUILD_ARCH: ${{ inputs.build-arch }}
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: cd android-project && chmod u+x ./gradlew && ./gradlew app:assembleReleaseOneArch

    - name: clean up
      working-directory: $${{env.GITHUB_WORKSPACE}}
      run: |
        cd android-project/app
        rm -rf keystore
        rm build/outputs/apk/release/output-metadata.json
        rm -rf build/outputs/apk/release/baselineProfiles
        mv build/outputs/apk/release/app-release.apk build/outputs/apk/release/voidsprite-release.apk
        cp -R ../../OPEN_SOURCE_LICENSES build/outputs/apk/release/OPEN_SOURCE_LICENSES

    - name: Push build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: voidsprite-build-android-${{ inputs.build-arch }}
        retention-days: 1
        path: |
          android-project/app/build/outputs/apk/release
